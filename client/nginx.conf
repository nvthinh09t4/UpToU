server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # ── Compression ────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/rss+xml image/svg+xml;

    # ── Security headers ───────────────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"         always;
    add_header X-Frame-Options         "SAMEORIGIN"      always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;

    # ── HTML — short cache so crawlers get fresh meta tags ────────────
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri /index.html;
    }

    # ── Sitemap & robots — allow crawlers, no cache ───────────────────
    location ~* \.(xml|txt)$ {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # ── SPA fallback — all client-side routes resolve to index.html ───
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Long-cache fingerprinted static assets ────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|webp|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Health / favicon noise suppression ────────────────────────────
    location = /favicon.ico { log_not_found off; access_log off; }
    location = /robots.txt  { log_not_found off; access_log off; }
}
